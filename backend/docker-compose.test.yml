version: '3.8'

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: timeslot-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: timeslot_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d timeslot_test"]
      interval: 5s
      timeout: 5s
      retries: 5
